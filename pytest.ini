[pytest]
# Register custom markers เพื่อป้องกัน PytestUnknownMarkWarning
markers =
    unit: Unit tests — ทดสอบ component เดียว ไม่ต้องรัน server (เร็ว)
    integration: Integration tests — ทดสอบ API ผ่าน FastAPI TestClient
    e2e: End-to-end tests — ต้องมีรูปภาพจริงและ model โหลดสำเร็จ (ช้า)

# Test discovery
testpaths = testService

# Output
addopts = --tb=short
